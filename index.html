<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLBB Draft Pick</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0e1a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .header {
            text-align: center;
            padding: 20px;
            background: linear-gradient(180deg, #1a1f3a 0%, #0a0e1a 100%);
            border-bottom: 2px solid #2a3060;
        }
        .header h1 {
            font-size: 28px;
            background: linear-gradient(90deg, #4fc3f7, #ab47bc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 3px;
        }
        .header p { color: #8892b0; font-size: 13px; margin-top: 6px; }

        .draft-container {
            display: flex; justify-content: center; align-items: flex-start;
            gap: 40px; padding: 30px 20px; max-width: 1400px; margin: 0 auto;
        }
        .team { flex: 1; max-width: 420px; }
        .team-title {
            text-align: center; font-size: 18px; font-weight: 700;
            padding: 12px; border-radius: 10px 10px 0 0; letter-spacing: 2px;
        }
        .team-blue .team-title { background: linear-gradient(135deg, #1565c0, #0d47a1); color: #90caf9; }
        .team-red .team-title { background: linear-gradient(135deg, #c62828, #b71c1c); color: #ef9a9a; }

        .pick-slots {
            display: flex; flex-direction: column; gap: 10px; padding: 15px;
            background: #111630; border-radius: 0 0 10px 10px;
            border: 1px solid #1e2550; border-top: none;
        }
        .pick-slot {
            display: flex; align-items: center; gap: 14px; padding: 10px 14px;
            background: #161b3a; border: 2px solid #252b55; border-radius: 10px;
            cursor: pointer; transition: all 0.2s; min-height: 72px;
        }
        .pick-slot:hover { border-color: #4a5090; background: #1c2248; }
        .pick-slot.active { border-color: #ffd740; box-shadow: 0 0 15px rgba(255, 215, 64, 0.2); }
        .pick-slot.filled { border-color: #4caf50; }
        .team-red .pick-slot.filled { border-color: #ef5350; }

        .slot-number {
            width: 28px; height: 28px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 700; flex-shrink: 0;
        }
        .team-blue .slot-number { background: #1565c0; }
        .team-red .slot-number { background: #c62828; }

        .slot-avatar {
            width: 50px; height: 50px; border-radius: 8px; background: #252b55;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; flex-shrink: 0;
        }
        .slot-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .slot-avatar .placeholder { font-size: 22px; color: #4a5090; }

        .slot-info { flex: 1; min-width: 0; }
        .slot-info .hero-name { font-size: 15px; font-weight: 600; color: #e0e6ff; }
        .slot-info .hero-role { font-size: 12px; color: #7882a4; margin-top: 2px; }
        .slot-info .hint { font-size: 12px; color: #4a5090; font-style: italic; }

        .slot-remove {
            width: 26px; height: 26px; border-radius: 50%; border: none;
            background: #3a2040; color: #ef5350; font-size: 14px;
            cursor: pointer; display: none; align-items: center;
            justify-content: center; flex-shrink: 0;
        }
        .slot-remove:hover { background: #5a2040; }
        .pick-slot.filled .slot-remove { display: flex; }

        .vs-divider {
            display: flex; align-items: center; justify-content: center;
            font-size: 36px; font-weight: 900; color: #ffd740;
            text-shadow: 0 0 20px rgba(255, 215, 64, 0.4);
            padding-top: 60px; letter-spacing: 4px; flex-shrink: 0;
        }

        /* Picker Modal */
        .picker-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.85); z-index: 1000;
            justify-content: center; align-items: center; padding: 20px;
        }
        .picker-overlay.show { display: flex; }

        .picker-modal {
            background: #111630; border: 1px solid #2a3060; border-radius: 16px;
            width: 100%; max-width: 950px; max-height: 90vh;
            display: flex; flex-direction: column;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
        }
        .picker-header {
            padding: 18px 24px; border-bottom: 1px solid #1e2550;
            display: flex; align-items: center; gap: 16px;
        }
        .picker-header h2 { font-size: 18px; color: #e0e6ff; flex-shrink: 0; }
        .picker-search {
            flex: 1; padding: 10px 16px; background: #0a0e1a;
            border: 1px solid #252b55; border-radius: 8px;
            color: #fff; font-size: 14px; outline: none;
        }
        .picker-search:focus { border-color: #4fc3f7; }
        .picker-search::placeholder { color: #4a5090; }
        .picker-close {
            width: 36px; height: 36px; border-radius: 50%; border: none;
            background: #1e2550; color: #8892b0; font-size: 20px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .picker-close:hover { background: #2a3060; color: #fff; }

        /* Counter sections in picker */
        .picker-section {
            padding: 10px 20px 4px; font-size: 13px; font-weight: 600;
            color: #8892b0; border-bottom: 1px solid #1a1f40;
            display: flex; align-items: center; gap: 8px;
        }
        .picker-section .badge {
            display: inline-block; padding: 2px 8px; border-radius: 10px;
            font-size: 11px; font-weight: 700;
        }
        .badge-counter { background: #ff980020; color: #ff9800; }
        .badge-all { background: #4fc3f720; color: #4fc3f7; }

        .counter-tag {
            display: inline-block; padding: 1px 6px; border-radius: 4px;
            font-size: 9px; font-weight: 700; margin-left: 4px;
            vertical-align: middle;
        }
        .counter-tag.vs { background: #ff980030; color: #ffb74d; }

        .picker-scroll {
            overflow-y: auto; flex: 1; padding-bottom: 10px;
        }

        .picker-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px; padding: 10px 20px;
        }

        .hero-card {
            display: flex; flex-direction: column; align-items: center;
            padding: 10px 6px; background: #161b3a; border: 2px solid #252b55;
            border-radius: 10px; cursor: pointer; transition: all 0.2s; position: relative;
        }
        .hero-card:hover { border-color: #4fc3f7; background: #1c2248; transform: translateY(-2px); }
        .hero-card.disabled { opacity: 0.3; pointer-events: none; }
        .hero-card.counter-pick { border-color: #ff9800; box-shadow: 0 0 10px rgba(255, 152, 0, 0.25); }

        .hero-card-avatar {
            width: 60px; height: 60px; border-radius: 8px;
            overflow: hidden; background: #252b55; margin-bottom: 4px;
        }
        .hero-card-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .hero-card-name { font-size: 11px; text-align: center; color: #c0c8e8; line-height: 1.2; word-break: break-word; }
        .hero-card-counters-info {
            font-size: 9px; color: #ffb74d; text-align: center;
            margin-top: 2px; line-height: 1.2;
        }

        .loading-overlay {
            position: fixed; inset: 0; background: #0a0e1a;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; z-index: 2000;
        }
        .loading-overlay.hidden { display: none; }
        .spinner {
            width: 50px; height: 50px; border: 4px solid #252b55;
            border-top-color: #4fc3f7; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { margin-top: 16px; color: #8892b0; font-size: 14px; }

        .reset-btn {
            display: block; margin: 0 auto 30px; padding: 12px 32px;
            background: linear-gradient(135deg, #1e2550, #2a3060);
            border: 1px solid #3a4080; border-radius: 8px;
            color: #8892b0; font-size: 14px; cursor: pointer;
        }
        .reset-btn:hover { background: linear-gradient(135deg, #2a3060, #3a4080); color: #fff; }

        /* Detail tooltip on hover */
        .hero-card .tooltip {
            display: none; position: absolute; bottom: 100%; left: 50%;
            transform: translateX(-50%); background: #1a1f3a; border: 1px solid #3a4080;
            border-radius: 8px; padding: 10px 14px; width: 220px; z-index: 10;
            pointer-events: none; margin-bottom: 8px;
        }
        .hero-card:hover .tooltip { display: block; }
        .tooltip .t-name { font-size: 14px; font-weight: 700; color: #ffd740; }
        .tooltip .t-role { font-size: 11px; color: #7882a4; }
        .tooltip .t-stats { font-size: 11px; color: #8892b0; margin-top: 4px; }
        .tooltip .t-stats span { color: #4fc3f7; }
        .tooltip .t-counter { font-size: 11px; margin-top: 4px; }

        @media (max-width: 768px) {
            .draft-container { flex-direction: column; align-items: center; gap: 10px; }
            .vs-divider { padding-top: 0; font-size: 24px; }
            .team { max-width: 100%; }
            .picker-grid { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); }
            .hero-card .tooltip { display: none !important; }
        }
    </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text">Đang tải danh sách tướng...</div>
</div>

<div class="header">
    <h1>MLBB DRAFT PICK</h1>
    <p>Chọn tướng cho cả 2 team → Xem gợi ý tướng khắc chế cho từng tướng đối phương</p>
</div>

<div class="draft-container">
    <div class="team team-blue" id="teamBlue">
        <div class="team-title">🔵 TEAM CỦA BẠN</div>
        <div class="pick-slots" id="blueSlots"></div>
    </div>
    <div class="vs-divider">VS</div>
    <div class="team team-red" id="teamRed">
        <div class="team-title">🔴 TEAM ĐỐI THỦ</div>
        <div class="pick-slots" id="redSlots"></div>
    </div>
</div>

<button class="reset-btn" onclick="resetDraft()">🔄 Reset Draft</button>

<div class="picker-overlay" id="pickerOverlay">
    <div class="picker-modal">
        <div class="picker-header">
            <h2 id="pickerTitle">Chọn tướng</h2>
            <input type="text" class="picker-search" id="pickerSearch" placeholder="Tìm tướng..." oninput="renderPickerContent()">
            <button class="picker-close" onclick="closePicker()">✕</button>
        </div>
        <div class="picker-scroll" id="pickerScroll"></div>
    </div>
</div>

<script>
    let allHeroes = [];
    let heroMap = {};       // id -> hero
    let counterMap = {};    // heroId -> Set of heroIds that counter it
    let bluePicks = [null, null, null, null, null];
    let redPicks = [null, null, null, null, null];
    let activeSlot = null;

    async function init() {
        try {
            const res = await fetch("heroes.json");
            allHeroes = await res.json();
            heroMap = {};
            counterMap = {};
            allHeroes.forEach(h => {
                heroMap[h.id] = h;
            });
            // Build reverse counter map: for each hero, which heroes counter it?
            // Source 1: if hero A has countered_by: B → B counters A
            // Source 2: if hero A has counters: C → A counters C
            allHeroes.forEach(h => {
                const c = h.counters || {};
                // B counters this hero (h)
                if (c.countered_by) {
                    if (!counterMap[h.id]) counterMap[h.id] = new Set();
                    counterMap[h.id].add(c.countered_by.id);
                }
                // This hero (h) counters C
                if (c.counters) {
                    const targetId = c.counters.id;
                    if (!counterMap[targetId]) counterMap[targetId] = new Set();
                    counterMap[targetId].add(h.id);
                }
            });
            renderSlots();
            document.getElementById("loadingOverlay").classList.add("hidden");
        } catch (e) {
            console.error("Failed to load heroes:", e);
            document.querySelector(".loading-text").textContent = "Lỗi tải dữ liệu. Vui lòng refresh trang.";
        }
    }

    function renderSlots() {
        renderTeamSlots("blue", bluePicks, "blueSlots");
        renderTeamSlots("red", redPicks, "redSlots");
    }

    function renderTeamSlots(team, picks, containerId) {
        const container = document.getElementById(containerId);
        container.innerHTML = "";
        const enemyPicks = team === "blue" ? redPicks : bluePicks;
        const hasEnemy = enemyPicks.some(p => p);

        picks.forEach((pick, i) => {
            const slot = document.createElement("div");
            slot.className = "pick-slot" + (pick ? " filled" : "") +
                (activeSlot && activeSlot.team === team && activeSlot.index === i ? " active" : "");
            slot.onclick = () => openPicker(team, i);

            const num = document.createElement("div");
            num.className = "slot-number";
            num.textContent = i + 1;

            const avatar = document.createElement("div");
            avatar.className = "slot-avatar";
            if (pick) {
                const img = document.createElement("img");
                img.src = pick.icon;
                img.alt = pick.name;
                img.loading = "lazy";
                avatar.appendChild(img);
            } else {
                const ph = document.createElement("div");
                ph.className = "placeholder";
                ph.textContent = "+";
                avatar.appendChild(ph);
            }

            const info = document.createElement("div");
            info.className = "slot-info";
            if (pick) {
                info.innerHTML = `<div class="hero-name">${pick.name}</div><div class="hero-role">${pick.type || ""}</div>`;
            } else {
                const hint = hasEnemy ? "Click để chọn tướng khắc chế" : "Click để chọn tướng";
                info.innerHTML = `<div class="hint">${hint}</div>`;
            }

            slot.appendChild(num);
            slot.appendChild(avatar);
            slot.appendChild(info);

            if (pick) {
                const removeBtn = document.createElement("button");
                removeBtn.className = "slot-remove";
                removeBtn.textContent = "✕";
                removeBtn.onclick = (e) => { e.stopPropagation(); removePick(team, i); };
                slot.appendChild(removeBtn);
            }
            container.appendChild(slot);
        });
    }

    function openPicker(team, index) {
        activeSlot = { team, index };
        renderSlots();
        document.getElementById("pickerSearch").value = "";
        document.getElementById("pickerOverlay").classList.add("show");
        document.getElementById("pickerSearch").focus();

        const title = document.getElementById("pickerTitle");
        if (team === "blue") {
            title.textContent = "🔵 Chọn tướng cho Team bạn";
        } else {
            title.textContent = "🔴 Chọn tướng cho Team đối thủ";
        }
        renderPickerContent();
    }

    // Get counters for enemy team: returns Map<enemyHeroId, Set<counterHeroId>>
    function getCountersForEnemyTeam(enemyPicks) {
        const result = new Map();
        enemyPicks.filter(p => p).forEach(enemy => {
            const counters = counterMap[enemy.id];
            if (counters && counters.size > 0) {
                result.set(enemy.id, new Set(counters));
            }
        });
        return result;
    }

    // Score each hero: how many enemy heroes does it counter?
    function scoreHeroes(enemyCounterMap, pickedIds) {
        const scores = {}; // heroId -> { score, countersWhich: [enemyName, ...] }
        for (const [enemyId, counterSet] of enemyCounterMap) {
            const enemyName = heroMap[enemyId]?.name || enemyId;
            counterSet.forEach(cid => {
                if (pickedIds.has(cid)) return;
                if (!scores[cid]) scores[cid] = { score: 0, countersWhich: [] };
                scores[cid].score++;
                scores[cid].countersWhich.push(enemyName);
            });
        }
        return scores;
    }

    function renderPickerContent() {
        const scroll = document.getElementById("pickerScroll");
        const search = document.getElementById("pickerSearch").value.toLowerCase();
        const team = activeSlot.team;

        const pickedIds = new Set([
            ...bluePicks.filter(p => p).map(p => p.id),
            ...redPicks.filter(p => p).map(p => p.id)
        ]);

        const enemyPicks = team === "blue" ? redPicks : bluePicks;
        const enemyCounterMap = getCountersForEnemyTeam(enemyPicks);
        const heroScores = scoreHeroes(enemyCounterMap, pickedIds);

        let filtered = allHeroes.filter(h => h.name.toLowerCase().includes(search));

        scroll.innerHTML = "";

        const hasEnemyPicks = enemyPicks.some(p => p);

        if (hasEnemyPicks && Object.keys(heroScores).length > 0) {
            // Section 1: Per-enemy counter suggestions
            const enemyHeroes = enemyPicks.filter(p => p);
            enemyHeroes.forEach(enemy => {
                const counters = counterMap[enemy.id];
                if (!counters || counters.size === 0) return;

                const counterHeroes = filtered.filter(h => counters.has(h.id) && !pickedIds.has(h.id));
                if (counterHeroes.length === 0) return;

                const section = document.createElement("div");
                section.className = "picker-section";
                section.innerHTML = `⚔️ Khắc chế <strong style="color:#ff9800">${enemy.name}</strong> <span class="badge badge-counter">${counterHeroes.length} tướng</span>`;
                scroll.appendChild(section);

                const grid = document.createElement("div");
                grid.className = "picker-grid";
                counterHeroes.forEach(hero => {
                    grid.appendChild(createHeroCard(hero, pickedIds, heroScores, true));
                });
                scroll.appendChild(grid);
            });

            // Section 2: Top counters (counter nhiều tướng nhất)
            const topCounters = filtered
                .filter(h => heroScores[h.id] && !pickedIds.has(h.id))
                .sort((a, b) => (heroScores[b.id]?.score || 0) - (heroScores[a.id]?.score || 0))
                .slice(0, 10);

            if (topCounters.length > 0) {
                const section = document.createElement("div");
                section.className = "picker-section";
                section.innerHTML = `🏆 Top khắc chế nhiều tướng nhất <span class="badge badge-counter">Top ${topCounters.length}</span>`;
                scroll.appendChild(section);

                const grid = document.createElement("div");
                grid.className = "picker-grid";
                topCounters.forEach(hero => {
                    grid.appendChild(createHeroCard(hero, pickedIds, heroScores, true));
                });
                scroll.appendChild(grid);
            }
        }

        // Section: All heroes
        const section = document.createElement("div");
        section.className = "picker-section";
        section.innerHTML = `📋 Tất cả tướng <span class="badge badge-all">${filtered.length}</span>`;
        scroll.appendChild(section);

        const grid = document.createElement("div");
        grid.className = "picker-grid";

        // Sort: counters first, then alphabetical
        filtered.sort((a, b) => {
            const sa = heroScores[a.id]?.score || 0;
            const sb = heroScores[b.id]?.score || 0;
            if (sb !== sa) return sb - sa;
            return a.name.localeCompare(b.name);
        });

        filtered.forEach(hero => {
            grid.appendChild(createHeroCard(hero, pickedIds, heroScores, false));
        });
        scroll.appendChild(grid);
    }

    function createHeroCard(hero, pickedIds, heroScores, isCounterSection) {
        const card = document.createElement("div");
        card.className = "hero-card";
        if (pickedIds.has(hero.id)) card.classList.add("disabled");

        const score = heroScores[hero.id];
        if (score && score.score > 0) card.classList.add("counter-pick");

        let counterInfo = "";
        if (score && score.countersWhich.length > 0) {
            counterInfo = `<div class="hero-card-counters-info">⚔️ vs ${score.countersWhich.join(", ")}</div>`;
        }

        // Tooltip
        const c = hero.counters || {};
        let tooltipCounter = "";
        if (c.best_mate) tooltipCounter += `<div style="color:#4caf50">👥 ${c.best_mate.name}</div>`;
        if (c.counters) tooltipCounter += `<div style="color:#ff9800">⚔️ Khắc chế: ${c.counters.name}</div>`;
        if (c.countered_by) tooltipCounter += `<div style="color:#ef5350">💀 Bị khắc chế: ${c.countered_by.name}</div>`;

        card.innerHTML = `
            <div class="tooltip">
                <div class="t-name">${hero.name}</div>
                <div class="t-role">${hero.type || ""}</div>
                <div class="t-stats">PHY: <span>${hero.phy || "-"}</span> · MAG: <span>${hero.mag || "-"}</span> · HP: <span>${hero.alive || "-"}</span></div>
                <div class="t-counter">${tooltipCounter}</div>
            </div>
            <div class="hero-card-avatar">
                <img src="${hero.icon}" alt="${hero.name}" loading="lazy" onerror="this.style.display='none'">
            </div>
            <div class="hero-card-name">${hero.name}</div>
            ${counterInfo}
        `;

        card.onclick = () => selectHero(hero);
        return card;
    }

    function selectHero(hero) {
        if (!activeSlot) return;
        const picks = activeSlot.team === "blue" ? bluePicks : redPicks;
        picks[activeSlot.index] = hero;
        renderSlots();
        closePicker();
    }

    function closePicker() {
        document.getElementById("pickerOverlay").classList.remove("show");
        activeSlot = null;
        renderSlots();
    }

    function removePick(team, index) {
        if (team === "blue") bluePicks[index] = null;
        else redPicks[index] = null;
        renderSlots();
    }

    function resetDraft() {
        bluePicks = [null, null, null, null, null];
        redPicks = [null, null, null, null, null];
        renderSlots();
    }

    document.getElementById("pickerOverlay").addEventListener("click", (e) => {
        if (e.target === document.getElementById("pickerOverlay")) closePicker();
    });
    document.addEventListener("keydown", (e) => { if (e.key === "Escape") closePicker(); });

    init();
</script>
</body>
</html>
