name: Update MLBB Hero Data

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch hero data from Moonton API
        run: |
          python3 << 'PY'
          import json, urllib.request, ssl

          ctx = ssl.create_default_context()
          ctx.check_hostname = False
          ctx.verify_mode = ssl.CERT_NONE

          url = "https://api.gms.moontontech.com/api/gms/source/2669606/2756564"
          body = json.dumps({
              "pageSize": 200,
              "pageIndex": 1,
              "filters": [
                  {"field": "<hero.data.sortid>", "operator": "hasAnyOf", "value": [1,2,3,4,5,6]},
                  {"field": "<hero.data.roadsort>", "operator": "hasAnyOf", "value": [1,2,3,4,5]}
              ],
              "sorts": [{"data": {"field": "hero_id", "order": "desc"}, "type": "sequence"}],
              "fields": ["id","hero_id","hero.data.name","hero.data.smallmap","hero.data.sortid","hero.data.roadsort"],
              "object": []
          }).encode()

          req = urllib.request.Request(url, data=body, method="POST", headers={
              "Content-Type": "application/json;charset=UTF-8",
              "x-appid": "2669606",
              "x-actid": "2669607",
              "x-lang": "en"
          })

          with urllib.request.urlopen(req, context=ctx, timeout=30) as r:
              data = json.loads(r.read())

          def parse_roles(sortid):
              if not sortid: return []
              return [s["data"]["sort_title"] for s in sortid if isinstance(s, dict) and s.get("data", {}).get("sort_title")]

          def parse_lanes(roadsort):
              if not roadsort: return []
              return [s["data"]["road_sort_title"] for s in roadsort if isinstance(s, dict) and s.get("data", {}).get("road_sort_title")]

          heroes = []
          for rec in data["data"]["records"]:
              d = rec["data"]
              hero_data = d.get("hero", {}).get("data", {})
              rel = d.get("relation", {})
              heroes.append({
                  "id": str(d["hero_id"]),
                  "name": hero_data.get("name", ""),
                  "icon": hero_data.get("smallmap", ""),
                  "roles": parse_roles(hero_data.get("sortid")),
                  "lanes": parse_lanes(hero_data.get("roadsort")),
                  "strong": [str(x) for x in (rel.get("strong", {}).get("target_hero_id") or [])],
                  "weak": [str(x) for x in (rel.get("weak", {}).get("target_hero_id") or [])],
                  "assist": [str(x) for x in (rel.get("assist", {}).get("target_hero_id") or [])],
              })

          heroes.sort(key=lambda x: x["name"])
          json.dump(heroes, open("heroes.json", "w"), ensure_ascii=False, indent=2)
          print(f"Updated: {len(heroes)} heroes")
          PY

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add heroes.json
          git diff --cached --quiet || (git commit -m "chore: update hero data $(date -u +%Y-%m-%d)" && git push)
